<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micropay Bazaar API</title>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for parsing JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Simple smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // A lightweight Lucide Icon wrapper for React without a bundler
        const Icon = ({ name, size = 24, className = '', color = 'currentColor' }) => {
            const iconRef = React.useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            stroke: color,
                        }
                    });
                }
            }, [name, size, className, color]);

            return <i ref={iconRef} data-lucide={name}></i>;
        };

        const MethodBadge = ({ method }) => {
            const isGet = method === 'GET';
            const colorClass = isGet ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700';
            return (
                <span className={\`px-2 py-0.5 rounded-full text-[10px] font-bold font-mono tracking-wide \${colorClass}\`}>
          {method}
        </span>
      );
    };

    const ParamRow = ({ name, type, required, desc }) => (
      <div className="py-4 border-b border-slate-100 last:border-0">
        <div className="flex items-center gap-2 mb-1.5">
          <span className="font-mono text-sm font-bold text-slate-900">{name}</span>
          <span className="font-mono text-xs text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{type}</span>
          {required && (
            <span className="text-[10px] uppercase font-bold tracking-wider text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded">
              Required
            </span>
          )}
        </div>
        <div className="text-sm text-slate-600 leading-relaxed">{desc}</div>
      </div>
    );

    const NavLink = ({ title, isActive }) => (
      <a
        href={\`#\${title.toLowerCase().replace(/\\s+/g, '-')}\`}
        className={\`block py-1.5 text-sm \${isActive ? 'text-slate-900 font-semibold' : 'text-slate-500 hover:text-slate-900'} transition-colors duration-150\`}
      >
        {title}
      </a>
    );

    function MicropayDocs() {
      // Dynamic Services Injection (handled by server.js string replacement)
      // This will be replaced by the server before serving HTML
      const DYNAMIC_SERVICES_HTML = \`<!-- DYNAMIC_SERVICES_PLACEHOLDER -->\`;

      return (
        <div className="flex h-screen w-full bg-slate-900 text-slate-900 font-sans overflow-hidden antialiased selection:bg-blue-100 selection:text-blue-900">
          
          <aside className="w-[260px] flex-shrink-0 border-r border-slate-200 overflow-y-auto hidden md:flex flex-col bg-slate-50 relative z-20">
            <div className="p-6 sticky top-0 bg-slate-50/90 backdrop-blur-md z-10 border-b border-slate-100">
              <div className="flex items-center gap-2 mb-1">
                <div className="w-6 h-6 bg-blue-600 rounded-md flex items-center justify-center">
                  <span className="text-white font-bold text-xs">M</span>
                </div>
                <span className="font-bold text-lg tracking-tight">Micropay</span>
              </div>
              <p className="text-xs text-slate-500 font-medium">Bazaar API v1.0.0</p>
            </div>

            <nav className="flex-1 px-6 pt-6 pb-8 space-y-8">
              <div>
                <div className="flex items-center gap-2 mb-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                  <Icon name="Book" size={14} className="text-slate-400" /> Getting Started
                </div>
                <div className="space-y-1">
                  <NavLink title="Authentication" isActive />
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                  <Icon name="Server" size={14} className="text-slate-400" /> Registry
                </div>
                <div className="space-y-1">
                  <NavLink title="Register a Service" />
                  <NavLink title="Discover Services" />
                  <NavLink title="Get a Service" />
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                  <Icon name="CreditCard" size={14} className="text-slate-400" /> Charges
                </div>
                <div className="space-y-1">
                  <NavLink title="Create a Charge" />
                  <NavLink title="List Charges" />
                  <NavLink title="Get a Charge" />
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                  <Icon name="Cpu" size={14} className="text-slate-400" /> AI Gateway
                </div>
                <div className="space-y-1">
                  <NavLink title="Chat Completions" />
                  <NavLink title="Direct AI Chat" />
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                  <Icon name="Activity" size={14} className="text-slate-400" /> Network
                </div>
                <div className="space-y-1">
                  <NavLink title="Get Balance" />
                  <NavLink title="Health Check" />
                </div>
              </div>
            </nav>
          </aside>

          <main className="flex-1 flex overflow-hidden relative bg-white">
            <div className="absolute inset-0 pointer-events-none flex z-0 hidden lg:flex">
              <div className="w-[55%] bg-white h-full" />
              <div className="w-[45%] bg-slate-900 border-l border-slate-800" />
            </div>

            <div className="relative flex-1 overflow-y-auto scroll-smooth z-10 w-full lg:w-full" id="scroll-container">
              <div className="flex flex-col">
                
                {/* Authentication */}
                <section id="authentication" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 mb-4">Authentication</h1>
                    <p className="text-slate-600 mb-6 leading-relaxed">
                      Micropay Bazaar uses API keys for authentication. Protected routes require your API key in the Authorization header.
                    </p>
                    <div className="bg-amber-50 rounded-lg p-5 border border-amber-200">
                      <div className="flex items-start gap-3">
                        <Icon name="Key" size={18} className="text-amber-500 mt-0.5 shrink-0" />
                        <p className="text-sm text-amber-900 leading-relaxed">
                          <strong>Keep your keys safe.</strong> Avoid sharing your secret keys in publicly accessible areas such as GitHub or client-side code.
                        </p>
                      </div>
                    </div>
                  </div>
                  
                  <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0 lg:pt-28">
                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Example Request</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto">
                      <pre className="text-slate-300">
                        <span className="text-sky-400">Authorization:</span> Bearer <span className="text-emerald-300">&lt;YOUR_API_KEY&gt;</span>
                      </pre>
                    </div>
                  </div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                {/* Registry Section */}
                {/* Dynamically inserted services table will go right here via innerHTML */}
                <div dangerouslySetInnerHTML={{ __html: DYNAMIC_SERVICES_HTML }} />

                <section id="register-a-service" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Register a Service</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="POST" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/register</code>
                    </div>
                    <p className="text-slate-600 mb-8 leading-relaxed">
                      Registers an AI tool into the active global Micropay Bazaar discovery index. Agents can dynamically discover your service and execute it paying via x402 protocols.
                    </p>
                    
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Body Parameters</h3>
                    <ParamRow name="name" type="string" required desc="The human-readable name of your service." />
                    <ParamRow name="description" type="string" required desc="Detailed description of what the service does, used heavily during agent semantic search." />
                    <ParamRow name="endpoint" type="string" required desc="The fully qualified URL where your service API resides." />
                    <ParamRow name="cost_usd" type="number" required desc="The exact cost per execution in USD." />
                    <ParamRow name="developer_wallet" type="string" required desc="Your Solana wallet base58 address where settlement funds will be directed." />
                  </div>

                  <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Request</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose mb-8">
                      <pre>
<span className="text-pink-400">curl</span> -X POST https://micropay.up.railway.app/api/v1/registry/register \
  <span className="text-sky-400">-H</span> <span className="text-amber-200">"Authorization: Bearer &lt;YOUR_API_KEY&gt;"</span> \
  <span className="text-sky-400">-H</span> <span className="text-amber-200">"Content-Type: application/json"</span> \
  <span className="text-sky-400">-d</span> <span className="text-amber-200">'{'{'}</span>
    <span className="text-blue-300">"name"</span>: <span className="text-emerald-300">"Weather Oracle"</span>,
    <span className="text-blue-300">"description"</span>: <span className="text-emerald-300">"Detailed real-time meteorological data."</span>,
    <span className="text-blue-300">"endpoint"</span>: <span className="text-emerald-300">"https://api.example.com/weather"</span>,
    <span className="text-blue-300">"cost_usd"</span>: <span className="text-orange-300">0.05</span>,
    <span className="text-blue-300">"developer_wallet"</span>: <span className="text-emerald-300">"2Hn6ES...xG9"</span>
  <span className="text-amber-200">{'}'}'</span>
                      </pre>
                    </div>

                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Response</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose">
                      <pre>
<span className="text-slate-400">{'{'}</span>
  <span className="text-blue-300">"id"</span>: <span className="text-emerald-300">"srv_ak392nf9d21"</span>,
  <span className="text-blue-300">"object"</span>: <span className="text-emerald-300">"service"</span>,
  <span className="text-blue-300">"created_at"</span>: <span className="text-emerald-300">"2026-02-28T12:00:00Z"</span>,
  <span className="text-blue-300">"name"</span>: <span className="text-emerald-300">"Weather Oracle"</span>,
  <span className="text-blue-300">"cost_usd"</span>: <span className="text-orange-300">0.05</span>
<span className="text-slate-400">{'}'}</span>
                      </pre>
                    </div>
                  </div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="discover-services" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Discover Services</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/discover</code>
                    </div>
                    <p className="text-slate-600 mb-8 leading-relaxed">
                      Retrieve a list of available services. This request is unauthenticated. Use the query parameter to search services dynamically by intent or keywords.
                    </p>
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Query Parameters</h3>
                    <ParamRow name="query" type="string" desc="Optional. An intent-based search term (e.g., 'weather', 'crypto')." />
                  </div>
                  <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Request</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose">
                      <pre>
<span className="text-pink-400">curl</span> -G https://micropay.up.railway.app/api/v1/registry/discover \
  <span className="text-sky-400">--data-urlencode</span> <span className="text-amber-200">"query=weather"</span>
                      </pre>
                    </div>
                  </div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="get-a-service" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Get a Service</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/services/:id</code>
                    </div>
                    <p className="text-slate-600">Retrieves the specifics of an existing service by its unique service ID.</p>
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                {/* Charges */}
                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="create-a-charge" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Create a Charge</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="POST" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/charges</code>
                    </div>
                    <p className="text-slate-600 mb-8 leading-relaxed">
                      Initiates an x402 payment flow. Returns a base64 encoded Solana transaction payload representing the cost of the requested service, ready for a wallet (e.g., Phantom) to sign and broadcast.
                    </p>

                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Headers</h3>
                    <ParamRow name="Idempotency-Key" type="string" desc="Optional. Guarantees that the same charge is not created twice if requests are retried." />
                    
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3 mt-8">Body Parameters</h3>
                    <ParamRow name="service_id" type="string" required desc="The ID of the service you intend to consume (e.g., srv_ak392nf9d21)." />
                    <ParamRow name="source_wallet" type="string" required desc="The public address of the consumer wallet that will pay the invoice." />
                  </div>

                  <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Request</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose mb-8">
                      <pre>
<span className="text-pink-400">curl</span> -X POST https://micropay.up.railway.app/api/v1/charges \
  <span className="text-sky-400">-H</span> <span className="text-amber-200">"Authorization: Bearer &lt;YOUR_API_KEY&gt;"</span> \
  <span className="text-sky-400">-H</span> <span className="text-amber-200">"Idempotency-Key: idemp_11928"</span> \
  <span className="text-sky-400">-d</span> <span className="text-amber-200">'{'{'}</span>
    <span className="text-blue-300">"service_id"</span>: <span className="text-emerald-300">"srv_ak392nf9d21"</span>,
    <span className="text-blue-300">"source_wallet"</span>: <span className="text-emerald-300">"CxM...4gV"</span>
  <span className="text-amber-200">{'}'}'</span>
                      </pre>
                    </div>

                    <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Response</div>
                    <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose">
                      <pre>
<span className="text-slate-400">{'{'}</span>
  <span className="text-blue-300">"id"</span>: <span className="text-emerald-300">"ch_wb4bedrhxh1q"</span>,
  <span className="text-blue-300">"object"</span>: <span className="text-emerald-300">"charge"</span>,
  <span className="text-blue-300">"service_id"</span>: <span className="text-emerald-300">"srv_ak392nf9d21"</span>,
  <span className="text-blue-300">"amount_sol"</span>: <span className="text-orange-300">0.00035</span>,
  <span className="text-blue-300">"status"</span>: <span className="text-emerald-300">"pending"</span>,
  <span className="text-blue-300">"transaction_base64"</span>: <span className="text-emerald-300">"AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA..."</span>
<span className="text-slate-400">{'}'}</span>
                      </pre>
                    </div>
                  </div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="list-charges" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">List Charges</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/charges</code>
                    </div>
                    <p className="text-slate-600 mb-8 leading-relaxed">Returns a cursor-paginated list of charges.</p>
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Query Parameters</h3>
                    <ParamRow name="limit" type="int" desc="A limit on the number of objects to be returned." />
                    <ParamRow name="offset" type="int" desc="Pagination offset index." />
                    <ParamRow name="status" type="string" desc="Filter by charge status (e.g., 'pending', 'succeeded')." />
                    <ParamRow name="source_wallet" type="string" desc="Filter by the wallet that initiated the transaction." />
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="get-a-charge" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Get a Charge</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/charges/:id</code>
                    </div>
                    <p className="text-slate-600">Retrieves the details of a charge that has previously been created.</p>
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                {/* AI Gateway */}
                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="chat-completions" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Chat Completions</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="POST" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/chat/completions</code>
                    </div>
                    <p className="text-slate-600 leading-relaxed">
                      OpenRouter proxy. This endpoint intercepts messages and auto-injects Micropay Bazaar tools transparently to perform dynamic capabilities.
                    </p>
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="direct-ai-chat" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Direct AI Chat</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="POST" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/ai/chat</code>
                    </div>
                    <p className="text-slate-600 mb-8 leading-relaxed">
                      Passthrough plain-text chat to the underlying OpenAI layer.
                    </p>
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Body Parameters</h3>
                    <ParamRow name="message" type="string" required desc="The text message intended for the assistant." />
                    <ParamRow name="model" type="string" desc="Defaults to 'gpt-4o-mini'." />
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                {/* Network Utils */}
                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="get-balance" className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Get Balance</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/balance/:wallet</code>
                    </div>
                    <p className="text-slate-600">Returns the real-time SOL balance for a specified Solana wallet address via the Solana Devnet RPC.</p>
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                <div className="w-full h-px bg-slate-100 hidden lg:block" />

                <section id="health-check" className="flex flex-col lg:flex-row w-full lg:border-none">
                  <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                    <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Health Check</h2>
                    <div className="flex items-center gap-3 mb-6">
                      <MethodBadge method="GET" />
                      <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/health</code>
                    </div>
                    <p className="text-slate-600">Public endpoint to ping the orchestrator and determine its uptime, version, and server time.</p>
                  </div>
                  <div className="w-full lg:w-[45%] py-16 bg-slate-900 shrink-0"></div>
                </section>

                <div className="w-full h-64 bg-slate-50" />
                
              </div>
            </div>
          </main>
        </div>
      );
    }

    const domNode = document.getElementById('root');
    const root = ReactDOM.createRoot(domNode);
    root.render(<MicropayDocs />);
    </script>
