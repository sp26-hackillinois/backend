<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micropay Bazaar API</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MethodBadge = ({ method }) => {
            const isGet = method === 'GET';
            const colorClass = isGet ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700';
            return (
                <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold font-mono tracking-wide ${colorClass}`}>
                    {method}
                </span>
            );
        };

        const ParamRow = ({ name, type: paramType, required, desc }) => (
            <div className="py-4 border-b border-slate-100 last:border-0">
                <div className="flex items-center gap-2 mb-1.5">
                    <span className="font-mono text-sm font-bold text-slate-900">{name}</span>
                    <span className="font-mono text-xs text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{paramType}</span>
                    {required && (
                        <span className="text-[10px] uppercase font-bold tracking-wider text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded">
                            Required
                        </span>
                    )}
                </div>
                <div className="text-sm text-slate-600 leading-relaxed">{desc}</div>
            </div>
        );

        const NavLink = ({ title, isActive }) => {
            const linkClass = isActive ? 'text-slate-900 font-semibold' : 'text-slate-500 hover:text-slate-900';
            return (
            <a
                href={`#${title.toLowerCase().replace(/\s+/g, '-')}`}
                className={`block py-1.5 text-sm ${linkClass} transition-colors duration-150`}
            >
                {title}
            </a>
            );
        };

        const Section = ({ id: sectionId, title, method, path, children, codePanel }) => (
            <>
                <section id={sectionId} className="flex flex-col lg:flex-row w-full border-b border-slate-200 lg:border-none">
                    <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                        <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">{title}</h2>
                        {method && path && (
                            <div className="flex items-center gap-3 mb-6">
                                <MethodBadge method={method} />
                                <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">{path}</code>
                            </div>
                        )}
                        {children}
                    </div>
                    <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                        {codePanel}
                    </div>
                </section>
                <div className="w-full h-px bg-slate-100 hidden lg:block" />
            </>
        );

        const CodeBlock = ({ label, code }) => (
            <div className="mb-8">
                {label && <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">{label}</div>}
                <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800 overflow-x-auto leading-loose">
                    <pre className="text-slate-300 whitespace-pre-wrap">{code}</pre>
                </div>
            </div>
        );

        function MicropayDocs() {
            return (
                <div className="flex h-screen w-full bg-white text-slate-900 font-sans overflow-hidden antialiased">

                    {/* Sidebar */}
                    <aside className="w-[260px] flex-shrink-0 border-r border-slate-200 overflow-y-auto hidden md:flex flex-col bg-slate-50">
                        <div className="p-6 sticky top-0 bg-slate-50/90 backdrop-blur-md z-10 border-b border-slate-100">
                            <div className="flex items-center gap-2 mb-1">
                                <div className="w-6 h-6 bg-indigo-600 rounded-md flex items-center justify-center">
                                    <span className="text-white font-bold text-xs">M</span>
                                </div>
                                <span className="font-bold text-lg tracking-tight">Micropay</span>
                            </div>
                            <p className="text-xs text-slate-500 font-medium">Bazaar API v1.0.0</p>
                        </div>

                        <nav className="flex-1 px-6 pt-6 pb-8 space-y-8">
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Getting Started</div>
                                <div className="space-y-1">
                                    <NavLink title="Overview" />
                                    <NavLink title="Authentication" />
                                </div>
                            </div>
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Registry</div>
                                <div className="space-y-1">
                                    <NavLink title="Register a Service" />
                                    <NavLink title="Discover Services" />
                                    <NavLink title="Get a Service" />
                                </div>
                            </div>
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Charges</div>
                                <div className="space-y-1">
                                    <NavLink title="Create a Charge" />
                                    <NavLink title="List Charges" />
                                    <NavLink title="Get a Charge" />
                                </div>
                            </div>
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">AI Gateway</div>
                                <div className="space-y-1">
                                    <NavLink title="Chat Completions" />
                                    <NavLink title="Direct AI Chat" />
                                </div>
                            </div>
                            <div>
                                <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Network</div>
                                <div className="space-y-1">
                                    <NavLink title="Get Balance" />
                                    <NavLink title="Health Check" />
                                </div>
                            </div>
                        </nav>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto">

                        {/* ── OVERVIEW ── */}
                        <section id="overview" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h1 className="text-4xl font-extrabold tracking-tight text-slate-900 mb-2">Documentation</h1>
                                <p className="text-xl text-slate-500 mb-8 font-light">
                                    Explore guides and examples to integrate Micropay Bazaar.
                                </p>
                                <div className="flex items-center mb-16 gap-4">
                                    <a href="#create-a-charge" className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-full font-semibold text-sm transition-colors flex items-center gap-2 shadow-sm">
                                        Get started →
                                    </a>
                                    <a href="#discover-services" className="text-slate-600 hover:text-slate-900 font-semibold text-sm transition-colors">
                                        Explore all services
                                    </a>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div>
                                        <h3 className="font-bold text-slate-900 mb-4 text-base">Payments</h3>
                                        <div className="space-y-3">
                                            <a href="#create-a-charge" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Accept x402 payments</a>
                                            <a href="#list-charges" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Verify blockchain transactions</a>
                                            <a href="#get-balance" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Check wallet balances</a>
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-slate-900 mb-4 text-base">AI Gateway</h3>
                                        <div className="space-y-3">
                                            <a href="#chat-completions" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Build agents with tools</a>
                                            <a href="#register-a-service" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Monetize AI skills</a>
                                            <a href="#discover-services" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Discover registry services</a>
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-slate-900 mb-4 text-base">Developers</h3>
                                        <div className="space-y-3">
                                            <a href="#authentication" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Set up API keys</a>
                                            <a href="#health-check" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">Monitor network health</a>
                                            <a href="#discover-services" className="block text-indigo-600 hover:text-indigo-800 text-sm font-medium">26 prebuilt services</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0 flex flex-col justify-center">
                                <div className="text-sm font-bold text-slate-100 mb-4">Quick Start</div>
                                <div className="bg-slate-950 rounded-xl overflow-hidden border border-slate-800 shadow-2xl">
                                    <div className="bg-slate-800 px-4 py-3 flex items-center gap-1.5">
                                        <div className="w-2.5 h-2.5 rounded-full bg-red-500/70"></div>
                                        <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/70"></div>
                                        <div className="w-2.5 h-2.5 rounded-full bg-green-500/70"></div>
                                        <span className="text-slate-400 text-xs ml-2 font-mono">terminal</span>
                                    </div>
                                    <div className="p-5 font-mono text-[13px] text-slate-300 leading-relaxed">
                                        <div className="text-slate-500 mb-3"># 1. Create a charge</div>
                                        <div className="mb-4 text-emerald-300">curl -X POST https://micropay.up.railway.app/api/v1/charges \</div>
                                        <div className="pl-4 text-slate-400 mb-4">  -H "Authorization: Bearer mp_live_demo_key" \{"\n"}  -d '&#123;"service_id":"finance_stocks","source_wallet":"YOUR_WALLET","amount_usd":0.05&#125;'</div>
                                        <div className="text-slate-500 mb-2"># 2. Sign the returned transaction_payload with Phantom</div>
                                        <div className="text-slate-500"># 3. Done — payment settled on Solana Devnet ✓</div>
                                        <div className="flex items-center gap-2 mt-4">
                                            <span className="text-slate-500">$</span>
                                            <span className="w-2 h-4 bg-indigo-500 animate-pulse block"></span>
                                        </div>
                                    </div>
                                </div>
                                <a href="#create-a-charge" className="text-right mt-3 text-xs font-semibold text-indigo-400 hover:text-indigo-300 transition-colors">
                                    Learn more about Charges →
                                </a>
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── AUTHENTICATION ── */}
                        <section id="authentication" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 mb-4">Authentication</h1>
                                <p className="text-slate-600 mb-6 leading-relaxed">
                                    Micropay Bazaar uses API keys for authentication. Protected routes require your API key in the <code className="bg-slate-100 px-1.5 py-0.5 rounded font-mono text-sm">Authorization</code> header.
                                </p>
                                <div className="bg-amber-50 rounded-lg p-5 border border-amber-200">
                                    <p className="text-sm text-amber-900 leading-relaxed">
                                        <strong>Demo key:</strong> <code className="font-mono bg-amber-100 px-1.5 py-0.5 rounded">mp_live_demo_key</code> — use this for all hackathon testing.
                                    </p>
                                </div>
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0 pt-28">
                                <div className="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider">Header</div>
                                <div className="bg-slate-950 rounded-xl p-5 font-mono text-[13px] shadow-2xl border border-slate-800">
                                    <span className="text-sky-400">Authorization:</span> Bearer <span className="text-emerald-300">mp_live_demo_key</span>
                                </div>
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── REGISTER A SERVICE ── */}
                        <section id="register-a-service" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Register a Service</h2>
                                <div className="flex items-center gap-3 mb-6">
                                    <MethodBadge method="POST" />
                                    <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/register</code>
                                </div>
                                <p className="text-slate-600 mb-8 leading-relaxed">
                                    Registers an AI tool into the global Micropay Bazaar discovery index. Agents can dynamically discover your service and pay via x402 protocols.
                                </p>
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Body Parameters</h3>
                                <ParamRow name="name" type="string" required={true} desc="The human-readable name of your service." />
                                <ParamRow name="description" type="string" required={true} desc="Detailed description used for agent semantic search." />
                                <ParamRow name="endpoint" type="string" required={true} desc="The fully qualified URL where your service API resides." />
                                <ParamRow name="cost_usd" type="number" required={true} desc="The exact cost per execution in USD." />
                                <ParamRow name="developer_wallet" type="string" required={true} desc="Your Solana base58 wallet address for settlement." />
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                                <CodeBlock label="Request" code={`curl -X POST https://micropay.up.railway.app/api/v1/registry/register \\
  -H "Authorization: Bearer mp_live_demo_key" \\
  -H "Content-Type: application/json" \\
  -d '{
    "name": "Weather Oracle",
    "description": "Real-time meteorological data.",
    "endpoint": "https://api.example.com/weather",
    "cost_usd": 0.05,
    "developer_wallet": "2Hn6ES...xG9"
  }'`} />
                                <CodeBlock label="Response" code={`{
  "id": "srv_ak392nf9d21",
  "object": "service",
  "created_at": "2026-02-28T12:00:00Z",
  "name": "Weather Oracle",
  "cost_usd": 0.05
}`} />
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── DISCOVER SERVICES ── */}
                        <section id="discover-services" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Discover Services</h2>
                                <div className="flex items-center gap-3 mb-6">
                                    <MethodBadge method="GET" />
                                    <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/discover</code>
                                </div>
                                <p className="text-slate-600 mb-8 leading-relaxed">
                                    Returns all registered services. Unauthenticated. Use the <code className="bg-slate-100 px-1 py-0.5 rounded font-mono text-xs">query</code> param to search by intent or keyword. 26 services preloaded covering weather, finance, news, sports, AI, blockchain, and more.
                                </p>
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Query Parameters</h3>
                                <ParamRow name="query" type="string" desc="Optional. Search by intent (e.g., 'weather', 'crypto', 'stocks')." />
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                                <CodeBlock label="Request" code={`curl https://micropay.up.railway.app/api/v1/registry/discover?query=finance`} />
                                <CodeBlock label="Response" code={`[
  {
    "id": "finance_stocks",
    "name": "Stock Price Feed",
    "category": "Finance",
    "description": "Live equity prices from NYSE and NASDAQ.",
    "endpoint": "GET /tools/finance/stocks",
    "developer_wallet": "2Hn6ES...zv8"
  },
  ...
]`} />
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── GET A SERVICE ── */}
                        <section id="get-a-service" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Get a Service</h2>
                                <div className="flex items-center gap-3 mb-6">
                                    <MethodBadge method="GET" />
                                    <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/registry/services/:id</code>
                                </div>
                                <p className="text-slate-600">Retrieves a single service by its ID. Use IDs from the discover endpoint (e.g., <code className="font-mono bg-slate-100 px-1 rounded text-xs">finance_stocks</code>, <code className="font-mono bg-slate-100 px-1 rounded text-xs">weather_openmeteo</code>).</p>
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                                <CodeBlock label="Request" code={`curl https://micropay.up.railway.app/api/v1/registry/services/finance_stocks`} />
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── CREATE A CHARGE ── */}
                        <section id="create-a-charge" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">Create a Charge</h2>
                                <div className="flex items-center gap-3 mb-6">
                                    <MethodBadge method="POST" />
                                    <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/charges</code>
                                </div>
                                <p className="text-slate-600 mb-8 leading-relaxed">
                                    Initiates an x402 payment flow. Returns a Base64-encoded unsigned Solana transaction ready for a wallet (e.g. Phantom) to sign and broadcast. The developer_wallet is pulled automatically from the service registry.
                                </p>
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Headers</h3>
                                <ParamRow name="Idempotency-Key" type="string" desc="Optional. Prevents duplicate charges on retry." />
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3 mt-8">Body Parameters</h3>
                                <ParamRow name="service_id" type="string" required={true} desc="ID of the service to consume (e.g., finance_stocks, weather_openmeteo)." />
                                <ParamRow name="source_wallet" type="string" required={true} desc="Public Solana address of the wallet paying the charge." />
                                <ParamRow name="amount_usd" type="number" required={true} desc="Amount to charge in USD (e.g., 0.05). Converted to SOL at live oracle price." />
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                                <CodeBlock label="Request" code={`curl -X POST https://micropay.up.railway.app/api/v1/charges \\
  -H "Authorization: Bearer mp_live_demo_key" \\
  -H "Content-Type: application/json" \\
  -d '{
    "service_id": "finance_stocks",
    "source_wallet": "AuofYo21...Nt5",
    "amount_usd": 0.05
  }'`} />
                                <CodeBlock label="Response" code={`{
  "id": "ch_wb4bedrhxh1q",
  "object": "charge",
  "status": "requires_signature",
  "service_id": "finance_stocks",
  "service_name": "Stock Price Feed",
  "amount_usd": 0.05,
  "exchange_rate_sol_usd": 150.0,
  "amount_sol": 0.000333,
  "source_wallet": "AuofYo21...Nt5",
  "destination_wallet": "2Hn6ES...zv8",
  "transaction_payload": "AQAAAAAAAAAA..."
}`} />
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── LIST CHARGES ── */}
                        <section id="list-charges" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
                                <h2 className="text-2xl font-bold tracking-tight text-slate-900 mb-3">List Charges</h2>
                                <div className="flex items-center gap-3 mb-6">
                                    <MethodBadge method="GET" />
                                    <code className="text-[13px] font-mono font-medium text-slate-600 bg-slate-50 px-2 py-0.5 rounded border border-slate-200">/api/v1/charges</code>
                                </div>
                                <p className="text-slate-600 mb-8 leading-relaxed">Returns a paginated list of charges, optionally filtered.</p>
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-3">Query Parameters</h3>
                                <ParamRow name="limit" type="int" desc="Max records to return (1–100, default 10)." />
                                <ParamRow name="offset" type="int" desc="Pagination offset." />
                                <ParamRow name="status" type="string" desc="Filter by status: requires_signature, confirmed, failed." />
                                <ParamRow name="source_wallet" type="string" desc="Filter by payer wallet address." />
                            </div>
                            <div className="w-full lg:w-[45%] py-16 px-8 lg:px-10 xl:px-12 bg-slate-900 shrink-0">
                                <CodeBlock label="Request" code={`curl https://micropay.up.railway.app/api/v1/charges?limit=5 \\
  -H "Authorization: Bearer mp_live_demo_key"`} />
                            </div>
                        </section>

                        <div className="w-full h-px bg-slate-100" />

                        {/* ── GET A CHARGE ── */}
                        <section id="get-a-charge" className="flex flex-col lg:flex-row w-full border-b border-slate-200">
                            <div className="w-full lg:w-[55%] py-16 px-8 lg:px-12 xl:px-16 bg-white shrink-0">
